name: 每日AI情报

on:
  schedule:
    - cron: '0 13 * * *'   # UTC 13:00 = 北京时间 21:00
  workflow_dispatch:         # 允许手动触发测试

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 允许push回仓库

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行情报采集
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_USER: chenheping1974
        run: python scripts/fetch_feeds.py

      - name: 提交并推送
        run: |
          git config user.name "tv-signals-bot"
          git config user.email "bot@tv-signals.local"
          git add feeds/ data/
          git diff --staged --quiet || (git commit -m "自动更新情报 [$(date +%Y-%m-%d)]" && git push)
