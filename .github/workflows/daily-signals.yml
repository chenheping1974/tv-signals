name: 每日AI情报

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: 情报采集
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_USER: chenheping1974
        run: python scripts/fetch_feeds.py

      - name: 提交
        run: |
          git config user.name "bot"
          git config user.email "bot@tv.local"
          git add feeds/ data/
          git diff --staged --quiet || (git commit -m "自动更新 $(date +%Y-%m-%d)" && git push)
