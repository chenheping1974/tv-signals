name: A股横截面选股

on:
  schedule:
    - cron: '30 8 * * 1,2,3,4,5'
  workflow_dispatch:

jobs:
  ranking:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/cache@v4
        with: { path: ~/.cache/huggingface, key: hf-kronos-v3 }

      - name: 安装依赖
        run: |
          pip install pandas numpy requests yfinance
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          git clone --depth 1 https://github.com/shiyu-coder/Kronos /tmp/kronos_repo -q
          pip install -r /tmp/kronos_repo/requirements.txt

      - name: 批量预测
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          export PYTHONPATH="/tmp/kronos_repo:$PYTHONPATH"
          python scripts/stock_ranking.py

      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: ranking-backup, path: data/ranking.json }

      - name: 提交结果
        run: |
          git config user.name "kronos-bot"
          git config user.email "bot@tv-signals.local"
          git add data/ranking.json data/ohlcv.csv.gz 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "选股更新 [$(date +%Y-%m-%d)]" && git pull --rebase && git push)
